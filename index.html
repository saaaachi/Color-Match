<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Match - 第29弾</title>
    <style>
        body { margin: 0; overflow: hidden; background: #e0f2f1; font-family: sans-serif; touch-action: none; }
        #ad-top, #ad-bottom { position: fixed; left: 0; width: 100%; height: 150px; background: #333; z-index: 100; display: flex; align-items: center; justify-content: center; }
        #ad-top { top: 0; } #ad-bottom { bottom: 0; }
        iframe { border: none; width: 100%; height: 150px; }
        #game-area { margin-top: 150px; height: calc(100vh - 300px); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #target-word { font-size: 60px; font-weight: bold; margin-bottom: 40px; }
        .btn-group { display: flex; gap: 20px; }
        .choice-btn { padding: 20px 40px; font-size: 24px; border: none; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; }
        #ui { position: absolute; top: 160px; width: 100%; text-align: center; font-size: 24px; font-weight: bold; color: #00796b; }
        
        /* 終了後メニュー */
        #end-menu { 
            position: absolute; top: 150px; width: 100%; height: calc(100vh - 300px); 
            background: rgba(255,255,255,0.95); display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 60; 
        }
        .menu-btn { 
            width: 220px; padding: 15px; margin: 10px; font-size: 20px; 
            border: none; border-radius: 30px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center;
        }
        #retry-btn { background: #4db6ac; color: white; box-shadow: 0 5px #00796b; }
        #more-games-btn { background: #ff4081; color: white; box-shadow: 0 5px #c2185b; }
    </style>
</head>
<body>
    <div id="ad-top"><iframe src="ad.html"></iframe></div>
    <div id="ad-bottom"><iframe src="ad.html"></iframe></div>
    
    <div id="end-menu">
        <h2 id="result-msg" style="color:#00796b; text-align:center;">Color Match</h2>
        <button id="retry-btn" class="menu-btn" onclick="startNewGame()">もう一度遊ぶ</button>
        <a href="https://saaaachi.github.io/Sweets-Tower/" id="more-games-btn" class="menu-btn">他のゲームはこちら</a>
    </div>

    <div id="ui">SCORE: 0</div>
    <div id="game-area">
        <p style="font-weight:bold; color:#00796b;">「文字の色」と「言葉の意味」は同じ？</p>
        <div id="target-word">あか</div>
        <div class="btn-group">
            <button class="choice-btn" style="background:#4db6ac;" onclick="check(true)">同じ</button>
            <button class="choice-btn" style="background:#e57373;" onclick="check(false)">違う</button>
        </div>
    </div>
    <script>
        const data = [{n:'あか', c:'red'}, {n:'あお', c:'blue'}, {n:'きいろ', c:'orange'}, {n:'みどり', c:'green'}];
        let score = 0, currentQ, timer, gameActive = false;

        function startNewGame() {
            document.getElementById("end-menu").style.display = "none";
            score = 0;
            document.getElementById("ui").innerText = "SCORE: 0";
            gameActive = true;
            next();
        }

        function next() {
            if(!gameActive) return;
            const word = data[Math.floor(Math.random()*4)];
            const color = data[Math.floor(Math.random()*4)];
            currentQ = { word: word.n, color: color.c, match: word.n === color.n };
            const el = document.getElementById("target-word");
            el.innerText = currentQ.word;
            el.style.color = currentQ.color;
            clearTimeout(timer);
            timer = setTimeout(() => { gameOver("時間切れ！"); }, Math.max(700, 1500 - score*30));
        }

        function check(val) {
            if(!gameActive) return;
            if(val === currentQ.match) { 
                score++; 
                document.getElementById("ui").innerText = "SCORE:"+score; 
                next(); 
            } else { 
                gameOver("ちがうよ！"); 
            }
        }

        function gameOver(msg) {
            gameActive = false;
            clearTimeout(timer);
            document.getElementById("result-msg").innerText = msg + "\nSCORE: " + score;
            document.getElementById("end-menu").style.display = "flex";
        }

        window.onload = () => {
            document.getElementById("end-menu").style.display = "flex";
            document.getElementById("retry-btn").innerText = "スタート！";
        };

        setInterval(() => { const fs = document.querySelectorAll('iframe'); fs.forEach(f => { const s = f.src; f.src = "about:blank"; setTimeout(() => f.src = s, 100); }); }, 30000);
    </script>
</body>
</html>
