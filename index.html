<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Match - 第29弾</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #e0f2f1; font-family: sans-serif; touch-action: none; position: fixed; width: 100%; height: 100%; }
        
        /* 広告枠を100pxにして画面を確保 */
        #ad-top, #ad-bottom { position: fixed; left: 0; width: 100%; height: 100px; background: #333; z-index: 100; display: flex; align-items: center; justify-content: center; }
        #ad-top { top: 0; } #ad-bottom { bottom: 0; }
        iframe { border: none; width: 100%; height: 100px; }

        /* ゲーム本体エリア */
        #game-outer { position: absolute; top: 100px; bottom: 100px; left: 0; right: 0; background: #e0f2f1; overflow: hidden; }
        #game-area { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        
        #ui { position: absolute; top: 5px; width: 100%; text-align: center; font-size: 20px; font-weight: bold; color: #00796b; z-index: 10; }
        #target-word { font-size: 55px; font-weight: bold; margin: 20px 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        
        .btn-group { display: flex; gap: 15px; }
        .choice-btn { padding: 15px 30px; font-size: 20px; border: none; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px rgba(0,0,0,0.2); }
        .choice-btn:active { transform: translateY(2px); box-shadow: none; }

        /* メニュー画面：スクロール対応 */
        #menuScreen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.96); display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-start; z-index: 50; 
            padding: 5px 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
        }

        #ad-middle-container { width: 300px; height: 120px; background: #000; margin: 5px 0; display: none; justify-content: center; align-items: center; overflow: hidden; flex-shrink: 0; }

        .menu-btn-group { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 8px; padding-bottom: 20px; }
        .menu-btn { width: 220px; padding: 12px; font-size: 18px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; }
        #retry-btn { background: #4db6ac; color: white; box-shadow: 0 4px #00796b; }
        #more-games-btn { background: #ff4081; color: white; box-shadow: 0 4px #c2185b; }
    </style>
</head>
<body>

    <div id="ad-top"><iframe src="ad.html"></iframe></div>

    <div id="game-outer">
        <div id="ui">SCORE: 0</div>
        
        <div id="game-area">
            <p style="font-weight:bold; color:#00796b; margin-bottom: 5px;">「文字の色」と「意味」は同じ？</p>
            <div id="target-word">あか</div>
            <div class="btn-group">
                <button class="choice-btn" style="background:#4db6ac;" onclick="check(true)">同じ</button>
                <button class="choice-btn" style="background:#e57373;" onclick="check(false)">違う</button>
            </div>
        </div>

        <div id="menuScreen">
            <h2 id="result-msg" style="color:#00796b; margin: 10px 0; font-size: 24px;">Color Match</h2>
            <p style="font-size: 13px; color: #666; margin: 0;">色に惑わされずに判断しよう！</p>
            
            <div id="ad-middle-container">
                <script src="https://adm.shinobi.jp/s/1e6de436ea850948e238e975a93767eb"></script>
            </div>

            <div class="menu-btn-group">
                <button id="retry-btn" class="menu-btn" onclick="startNewGame()">スタート！</button>
                <a href="https://saaaachi.github.io/Sweets-Tower/" id="more-games-btn" class="menu-btn">他のゲームはこちら</a>
            </div>
        </div>
    </div>

    <div id="ad-bottom"><iframe src="ad.html"></iframe></div>

    <script>
        const data = [
            {n:'あか', c:'red'}, 
            {n:'あお', c:'blue'}, 
            {n:'きいろ', c:'#fbc02d'}, // 黄色を見やすく調整
            {n:'みどり', c:'green'}
        ];
        let score = 0, currentQ, timer, gameActive = false;

        const menuScreen = document.getElementById("menuScreen");
        const adMid = document.getElementById("ad-middle-container");
        const resultMsg = document.getElementById("result-msg");
        const retryBtn = document.getElementById("retry-btn");

        function startNewGame() {
            menuScreen.style.display = "none";
            adMid.style.display = "none";
            score = 0;
            document.getElementById("ui").innerText = "SCORE: 0";
            gameActive = true;
            next();
        }

        function next() {
            if(!gameActive) return;
            // 単語と色をランダムに選ぶ
            const wordIdx = Math.floor(Math.random()*4);
            const colorIdx = Math.floor(Math.random()*4);
            
            currentQ = { 
                word: data[wordIdx].n, 
                color: data[colorIdx].c, 
                match: wordIdx === colorIdx 
            };
            
            const el = document.getElementById("target-word");
            el.innerText = currentQ.word;
            el.style.color = currentQ.color;
            
            clearTimeout(timer);
            // スコアが上がると制限時間がどんどん短くなる
            timer = setTimeout(() => { gameOver("時間切れ！"); }, Math.max(600, 1500 - score * 35));
        }

        function check(val) {
            if(!gameActive) return;
            if(val === currentQ.match) { 
                score++; 
                document.getElementById("ui").innerText = "SCORE: " + score; 
                next(); 
            } else { 
                gameOver("ちがうよ！"); 
            }
        }

        function gameOver(msg) {
            gameActive = false;
            clearTimeout(timer);
            resultMsg.innerText = msg + "\nSCORE: " + score;
            retryBtn.innerText = "もう一度遊ぶ";
            adMid.style.display = "flex";
            menuScreen.style.display = "flex";
            menuScreen.scrollTop = 0; // スクロールをトップに戻す
        }

        // 広告枠のリフレッシュ
        setInterval(() => {
            const fs = document.querySelectorAll('iframe');
            fs.forEach(f => {
                const s = f.src; f.src = "about:blank";
                setTimeout(() => f.src = s, 100);
            });
        }, 30000);
    </script>
</body>
</html>
