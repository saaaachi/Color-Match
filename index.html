<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Match</title>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; position: fixed; touch-action: none; }
        body { background: #e0f2f1; font-family: sans-serif; display: flex; flex-direction: column; }
        
        #ad-top, #ad-bottom { width: 100%; height: 100px; background: #333; display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 100; position: relative; }
        iframe { border: none; width: 100%; height: 100%; background: #333; }

        #game-outer { flex-grow: 1; position: relative; width: 100%; background: #e0f2f1; overflow: hidden; }
        #game-area { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 24px; font-weight: bold; color: #00796b; z-index: 10; display: none; }
        #target-word { font-size: 65px; font-weight: bold; margin: 20px 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        
        .btn-group { display: flex; gap: 20px; }
        .choice-btn { padding: 20px 40px; font-size: 22px; border: none; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px rgba(0,0,0,0.2); }
        .choice-btn:active { transform: translateY(2px); box-shadow: none; }

        #menuScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.96); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; padding: 20px 0; }
        #ad-middle-container { width: 320px; height: 100px; background: rgba(0,0,0,0.05); margin: 15px 0; display: none; justify-content: center; align-items: center; border: 1px solid #4db6ac; }

        .menu-btn-group { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 12px; }
        .menu-btn { width: 260px; padding: 15px; font-size: 18px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; }
        #retry-btn { background: #00796b; color: white; box-shadow: 0 4px #004d40; }
        #retry-btn:disabled { background: #ccc; opacity: 0.7; }
        #other-games-btn { background: #ff4081; color: white; box-shadow: 0 4px #c2185b; }

        #bigAdScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: none; justify-content: center; align-items: center; }
        .ad-frame-wrapper { width: 95%; height: 85%; position: relative; }
        .ad-close-btn { position: absolute; top: -15px; right: -15px; color: white; font-size: 22px; font-weight: bold; cursor: pointer; background: rgba(0,0,0,0.8); width: 44px; height: 44px; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 3100; border: 2px solid white; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="ad-top"><iframe id="frame-top" src="ad.html?pos=top"></iframe></div>
    <div id="game-outer">
        <div id="ui">SCORE: 0</div>
        <div id="game-area">
            <p style="font-weight:bold; color:#00796b; margin-bottom: 5px;">「文字の色」と「意味」は同じ？</p>
            <div id="target-word">準備中...</div>
            <div class="btn-group">
                <button class="choice-btn" style="background:#4db6ac;" onclick="check(true)">同じ</button>
                <button class="choice-btn" style="background:#e57373;" onclick="check(false)">違う</button>
            </div>
        </div>
        <div id="menuScreen">
            <h2 id="result-msg" style="color:#00796b; margin: 0; font-size: 32px;">Color Match</h2>
            <p id="menu-desc" style="margin:5px 0; font-size: 16px; color: #666;">色に惑わされずに判断しよう！</p>
            <div id="ad-middle-container">
                <script async src="https://imp-adedge.i-mobile.co.jp/script/v1/spot.js?20220104"></script>
                <div id="im-1e6de436ea850948e238e975a93767eb">
                    <script>(window.adsbyimobile=window.adsbyimobile||[]).push({pid:84561,mid:590804,asid:1924211,type:"banner",display:"inline",elementid:"im-1e6de436ea850948e238e975a93767eb"})</script>
                </div>
            </div>
            <div class="menu-btn-group">
                <button id="retry-btn" class="menu-btn" onclick="startNewGame()">★ スタート！ ★</button>
                <a href="https://saaaachi.github.io/" id="other-games-btn" class="menu-btn">他のゲームへ</a>
            </div>
        </div>
        <div id="bigAdScreen"><div class="ad-frame-wrapper"><div id="ad-close-btn" class="ad-close-btn" onclick="closeBigAd()"></div><iframe id="ad-large-frame" src="" style="width:100%; height:100%; border:none;"></iframe></div></div>
    </div>
    <div id="ad-bottom"><iframe id="frame-bottom" src="ad.html?pos=bottom"></iframe></div>

    <script>
        const data = [{n:'あか', c:'red'}, {n:'あお', c:'blue'}, {n:'きいろ', c:'#fbc02d'}, {n:'みどり', c:'green'}];
        let score = 0, currentQ, timer, gameActive = false, playCount = 0;
        const menuScreen = document.getElementById("menuScreen"), adMid = document.getElementById("ad-middle-container"), resultMsg = document.getElementById("result-msg"), retryBtn = document.getElementById("retry-btn"), ui = document.getElementById("ui");

        function startNewGame() { menuScreen.style.display="none"; adMid.style.display="none"; ui.style.display="block"; score=0; ui.innerText="SCORE: 0"; gameActive=true; next(); }
        function next() {
            if(!gameActive) return;
            const wordIdx=Math.floor(Math.random()*4), colorIdx=Math.floor(Math.random()*4);
            currentQ={word:data[wordIdx].n, color:data[colorIdx].c, match:wordIdx===colorIdx};
            const el=document.getElementById("target-word"); el.innerText=currentQ.word; el.style.color=currentQ.color;
            clearTimeout(timer); timer=setTimeout(()=>gameOver("時間切れ！"), Math.max(600, 1500-score*35));
        }
        function check(val) { if(!gameActive)return; if(val===currentQ.match){ score++; ui.innerText="SCORE: "+score; next(); }else{ gameOver("ちがうよ！"); } }
        function gameOver(msg) {
            gameActive=false; playCount++; clearTimeout(timer);
            resultMsg.innerText="GAME OVER"; document.getElementById("menu-desc").innerText=msg+"\nSCORE: "+score;
            retryBtn.innerText="お待ちください..."; retryBtn.disabled=true; adMid.style.display="flex"; menuScreen.style.display="flex";
            setTimeout(()=>{ retryBtn.disabled=false; retryBtn.innerText="もう一度遊ぶ"; }, 1500);
            if(playCount%2===0) setTimeout(showBigAd, 500);
        }
        function showBigAd() {
            const screen=document.getElementById("bigAdScreen"), closeBtn=document.getElementById("ad-close-btn");
            document.getElementById("ad-large-frame").src="./ad.large.html?t="+Date.now(); screen.style.display="flex";
            let countdown=5; closeBtn.style.display="flex"; closeBtn.innerText=countdown; closeBtn.style.pointerEvents="none";
            const timerInt=setInterval(()=>{ countdown--; closeBtn.innerText=countdown; if(countdown<=0){ clearInterval(timerInt); closeBtn.innerText="×"; closeBtn.style.pointerEvents="auto"; } }, 1000);
        }
        function closeBigAd() { document.getElementById("bigAdScreen").style.display="none"; }
        setInterval(()=>{ document.getElementById('frame-top').src="ad.html?pos=top&t="+Date.now(); }, 30000);
        setTimeout(()=>{ setInterval(()=>{ document.getElementById('frame-bottom').src="ad.html?pos=bottom&t="+Date.now(); }, 30000); }, 15000);
    </script>
</body>
</html>
